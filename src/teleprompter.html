<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Teleprompter</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --border: #2a2a3a;
      --text: #e0e0e8;
      --text-muted: #6a6a7a;
      --accent: #6c8cff;
      --accent-glow: rgba(108, 140, 255, 0.3);
      --spoken: #3a3a4a;
      --font-size: 40px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Input Screen ── */
    #input-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      gap: 1.5rem;
    }

    #input-screen h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    #input-screen p {
      color: var(--text-muted);
      font-size: 0.95rem;
      max-width: 500px;
      text-align: center;
      line-height: 1.5;
    }

    #script-input {
      width: 100%;
      max-width: 700px;
      min-height: 300px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      padding: 1.25rem;
      resize: vertical;
      line-height: 1.6;
      outline: none;
      transition: border-color 0.2s;
    }

    #script-input:focus {
      border-color: var(--accent);
    }

    #script-input::placeholder {
      color: var(--text-muted);
    }

    .btn {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      filter: brightness(1.15);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--text-muted);
    }

    .btn-danger {
      background: #ff4c4c;
      color: #fff;
    }

    .btn-danger:hover {
      filter: brightness(1.15);
    }

    /* ── Teleprompter Screen ── */
    #prompter-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    #prompter-screen.active {
      display: flex;
    }

    /* ── Top Bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 1rem;
    }

    .top-bar-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }

    .status-indicator.listening {
      background: #4cff88;
      box-shadow: 0 0 8px rgba(76, 255, 136, 0.5);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-label {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .font-size-control {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .font-size-control label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .font-size-control input[type="range"] {
      width: 100px;
      accent-color: var(--accent);
    }

    .font-size-value {
      font-size: 0.8rem;
      color: var(--text-muted);
      min-width: 35px;
    }

    /* ── Script Display ── */
    #script-display {
      flex: 1;
      overflow-y: auto;
      padding: 15vh 10vw;
      scroll-behavior: auto;
      line-height: 1.8;
    }

    #script-display::-webkit-scrollbar {
      width: 6px;
    }

    #script-display::-webkit-scrollbar-track {
      background: transparent;
    }

    #script-display::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .word {
      display: inline;
      font-size: var(--font-size);
      transition: color 0.3s, opacity 0.3s;
      color: var(--text);
    }

    .word.spoken {
      color: var(--spoken);
      opacity: 0.5;
    }

    .word.active {
      color: var(--accent);
      font-weight: 700;
      text-shadow: 0 0 20px var(--accent-glow);
    }

    .word-space {
      display: inline;
      width: 0.35em;
    }

    /* ── Mirror Mode ── */
    #script-display.mirror {
      transform: scaleX(-1);
    }

    /* ── Chrome Warning ── */
    .chrome-warning {
      background: #2a1a00;
      border: 1px solid #5a3a00;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      max-width: 500px;
      font-size: 0.9rem;
      color: #ffaa44;
      line-height: 1.5;
      display: none;
    }

    .chrome-warning.visible {
      display: block;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #script-display {
        padding: 10vh 5vw;
      }

      .top-bar {
        flex-wrap: wrap;
        padding: 0.5rem 1rem;
      }

      :root {
        --font-size: 28px;
      }
    }
  </style>
</head>
<body>

  <!-- ── Input Screen ── -->
  <div id="input-screen">
    <h1>Smart Teleprompter</h1>
    <p>Paste your script below, hit start, and read naturally. The teleprompter follows your voice and scrolls automatically.</p>

    <div class="chrome-warning" id="chrome-warning">
      This app requires Google Chrome for voice recognition (Web Speech API). Please open this page in Chrome.
    </div>

    <textarea
      id="script-input"
      placeholder="Paste your script here..."
      spellcheck="false"
    ></textarea>

    <div style="display: flex; gap: 0.75rem;">
      <button class="btn btn-primary" id="start-btn" disabled>Start</button>
    </div>
  </div>

  <!-- ── Teleprompter Screen ── -->
  <div id="prompter-screen">
    <div class="top-bar">
      <div class="top-bar-group">
        <div class="status-indicator" id="status-dot"></div>
        <span class="status-label" id="status-label">Ready</span>
      </div>

      <div class="top-bar-group">
        <div class="font-size-control">
          <label>Size</label>
          <input type="range" id="font-slider" min="20" max="80" value="40">
          <span class="font-size-value" id="font-value">40px</span>
        </div>

        <label style="font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.35rem; cursor: pointer;">
          <input type="checkbox" id="mirror-toggle"> Mirror
        </label>
      </div>

      <div class="top-bar-group">
        <button class="btn btn-secondary" id="pause-btn" style="display:none;">Pause</button>
        <button class="btn btn-secondary" id="resume-btn" style="display:none;">Resume</button>
        <button class="btn btn-danger" id="stop-btn">Stop</button>
      </div>
    </div>

    <div id="script-display"></div>
  </div>

  <script>
    // ═══════════════════════════════════════════════
    //  Smart Teleprompter — Phase 1 MVP
    // ═══════════════════════════════════════════════

    (() => {
      'use strict';

      // ── DOM refs ──
      const inputScreen   = document.getElementById('input-screen');
      const prompterScreen = document.getElementById('prompter-screen');
      const scriptInput   = document.getElementById('script-input');
      const startBtn      = document.getElementById('start-btn');
      const stopBtn       = document.getElementById('stop-btn');
      const pauseBtn      = document.getElementById('pause-btn');
      const resumeBtn     = document.getElementById('resume-btn');
      const scriptDisplay = document.getElementById('script-display');
      const statusDot     = document.getElementById('status-dot');
      const statusLabel   = document.getElementById('status-label');
      const fontSlider    = document.getElementById('font-slider');
      const fontValue     = document.getElementById('font-value');
      const mirrorToggle  = document.getElementById('mirror-toggle');
      const chromeWarning = document.getElementById('chrome-warning');

      // ── State ──
      let scriptWords = [];      // original words (display form)
      let normalizedWords = [];  // lowercase, no punctuation (for matching)
      let wordSpans = [];        // DOM span elements
      let sentences = [];        // array of { startIdx, endIdx, words[] (normalized) }
      let currentSentence = 0;   // index into sentences[]
      let pointer = 0;           // word-level pointer for highlighting (points to first word of current sentence)
      let recognition = null;
      let isListening = false;
      let isPaused = false;

      const MATCH_THRESHOLD = 0.5; // 50% of sentence words must match to advance

      // ── Check browser support ──
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        chromeWarning.classList.add('visible');
        startBtn.disabled = true;
      }

      // ── Enable start button when script has content ──
      scriptInput.addEventListener('input', () => {
        startBtn.disabled = scriptInput.value.trim().length === 0;
      });

      // ── Load saved script from localStorage ──
      const saved = localStorage.getItem('teleprompter-script');
      if (saved) {
        scriptInput.value = saved;
        startBtn.disabled = false;
      }

      // ── Normalize a word for matching (strip ALL punctuation) ──
      function normalize(word) {
        return word.toLowerCase().replace(/[^a-z0-9]/g, '');
      }

      // ── Levenshtein distance for fuzzy matching ──
      function levenshtein(a, b) {
        if (a === b) return 0;
        if (a.length === 0) return b.length;
        if (b.length === 0) return a.length;

        const matrix = [];
        for (let i = 0; i <= b.length; i++) matrix[i] = [i];
        for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

        for (let i = 1; i <= b.length; i++) {
          for (let j = 1; j <= a.length; j++) {
            const cost = b[i - 1] === a[j - 1] ? 0 : 1;
            matrix[i][j] = Math.min(
              matrix[i - 1][j] + 1,
              matrix[i][j - 1] + 1,
              matrix[i - 1][j - 1] + cost
            );
          }
        }
        return matrix[b.length][a.length];
      }

      // ── Fuzzy match: exact or Levenshtein ≤ 1 ──
      function isMatch(spoken, script) {
        if (spoken === script) return true;
        if (spoken.length < 2 || script.length < 2) return spoken === script;
        return levenshtein(spoken, script) <= 1;
      }

      // ── Filler words to ignore ──
      const FILLERS = new Set(['um', 'uh', 'like', 'you know', 'so', 'ah', 'er', 'hmm', 'mm']);

      // ── Tokenize script into words ──
      function tokenizeScript(text) {
        return text.split(/\s+/).filter(w => w.length > 0);
      }

      // ── Split script into sentences ──
      // Each sentence maps to a range of indices in the flat word list.
      function buildSentences(text, normalizedWords) {
        const sentenceTexts = text.split(/(?<=[.!?])\s+|(?:\r?\n){2,}/);
        const result = [];
        let wordIdx = 0;

        for (const sentenceText of sentenceTexts) {
          const wordsInSentence = sentenceText.split(/\s+/).filter(w => w.length > 0);
          if (wordsInSentence.length === 0) continue;

          const startIdx = wordIdx;
          const endIdx = wordIdx + wordsInSentence.length - 1;
          const words = normalizedWords.slice(startIdx, endIdx + 1).filter(w => w.length > 0);

          result.push({ startIdx, endIdx, words });
          wordIdx += wordsInSentence.length;
        }

        return result;
      }

      // ── Render script words as spans ──
      function renderScript() {
        scriptDisplay.innerHTML = '';
        wordSpans = [];

        scriptWords.forEach((word, i) => {
          const span = document.createElement('span');
          span.className = 'word';
          span.textContent = word;
          span.dataset.index = i;
          scriptDisplay.appendChild(span);
          wordSpans.push(span);

          // Add space between words
          if (i < scriptWords.length - 1) {
            const space = document.createTextNode(' ');
            scriptDisplay.appendChild(space);
          }
        });

        updateHighlight();
      }

      // ── Update word highlighting based on current sentence ──
      function updateHighlight() {
        const sent = sentences[currentSentence];
        wordSpans.forEach((span, i) => {
          span.classList.remove('spoken', 'active');
          if (sent && i < sent.startIdx) {
            span.classList.add('spoken');
          } else if (sent && i >= sent.startIdx && i <= sent.endIdx) {
            span.classList.add('active');
          }
        });
        // If we're past all sentences, dim everything
        if (currentSentence >= sentences.length) {
          wordSpans.forEach(span => {
            span.classList.remove('active');
            span.classList.add('spoken');
          });
        }
      }

      // ── Scroll to keep active sentence visible ──
      let scrollRAF = null;
      function scrollToActive() {
        if (scrollRAF) cancelAnimationFrame(scrollRAF);
        scrollRAF = requestAnimationFrame(() => {
          const sent = sentences[currentSentence];
          const activeSpan = sent ? wordSpans[sent.startIdx] : null;
          if (!activeSpan) return;

          const container = scriptDisplay;
          const spanRect = activeSpan.getBoundingClientRect();
          const containerRect = container.getBoundingClientRect();

          // Target: place active word at top-third of display
          const targetY = containerRect.top + containerRect.height * 0.33;
          const offset = spanRect.top - targetY;

          container.scrollBy({ top: offset, behavior: 'smooth' });
        });
      }

      // ── Check if spoken words match the current sentence ──
      function computeMatchRatio(spokenWords, sentence) {
        if (!sentence || sentence.words.length === 0) return 0;

        const matched = new Set();
        for (const spoken of spokenWords) {
          for (let i = 0; i < sentence.words.length; i++) {
            if (!matched.has(i) && isMatch(spoken, sentence.words[i])) {
              matched.add(i);
              break;
            }
          }
        }

        return matched.size / sentence.words.length;
      }

      // ── Process incoming transcribed words against current sentence ──
      function processTranscription(transcript) {
        if (currentSentence >= sentences.length) return;

        const spokenWords = transcript
          .split(/\s+/)
          .map(normalize)
          .filter(w => w.length > 0 && !FILLERS.has(w));

        if (spokenWords.length === 0) return;

        let advanced = false;

        // Check current sentence and potentially the next one (if speaker is ahead)
        while (currentSentence < sentences.length) {
          const ratio = computeMatchRatio(spokenWords, sentences[currentSentence]);

          if (ratio >= MATCH_THRESHOLD) {
            currentSentence++;
            advanced = true;
          } else {
            break;
          }
        }

        if (advanced) {
          updateHighlight();
          scrollToActive();
        }

        if (currentSentence >= sentences.length) {
          setStatus('Complete!', false);
        }
      }

      // ── Speech Recognition Setup ──
      function createRecognition() {
        const rec = new SpeechRecognition();
        rec.continuous = true;
        rec.interimResults = true;
        rec.lang = 'en-US';
        rec.maxAlternatives = 1;

        rec.onresult = (event) => {
          if (isPaused) return;

          // Collect the full transcript from this recognition session
          let fullTranscript = '';

          for (let i = event.resultIndex; i < event.results.length; i++) {
            fullTranscript += event.results[i][0].transcript;
          }

          if (fullTranscript) {
            processTranscription(fullTranscript);
          }
        };

        rec.onerror = (event) => {
          console.warn('Speech recognition error:', event.error);
          if (event.error === 'not-allowed') {
            setStatus('Microphone access denied', false);
            return;
          }
          // For other errors, try to restart
          if (isListening && !isPaused) {
            setTimeout(() => {
              if (isListening && !isPaused) {
                try { rec.start(); } catch(e) { /* already started */ }
              }
            }, 300);
          }
        };

        rec.onend = () => {
          // Auto-restart if we didn't intentionally stop
          if (isListening && !isPaused) {
            try { rec.start(); } catch(e) { /* already started */ }
          }
        };

        return rec;
      }

      // ── Status display ──
      function setStatus(text, listening) {
        statusLabel.textContent = text;
        statusDot.classList.toggle('listening', listening);
      }

      // ── Start teleprompter ──
      function start() {
        const text = scriptInput.value.trim();
        if (!text) return;

        // Save script
        localStorage.setItem('teleprompter-script', text);

        // Tokenize
        scriptWords = tokenizeScript(text);
        normalizedWords = scriptWords.map(normalize);
        sentences = buildSentences(text, normalizedWords);
        currentSentence = 0;
        pointer = 0;

        // Switch screens
        inputScreen.style.display = 'none';
        prompterScreen.classList.add('active');

        // Render
        renderScript();

        // Start listening
        recognition = createRecognition();
        isListening = true;
        isPaused = false;
        recognition.start();
        setStatus('Listening...', true);
        pauseBtn.style.display = '';
        resumeBtn.style.display = 'none';
      }

      // ── Stop teleprompter ──
      function stop() {
        isListening = false;
        isPaused = false;
        if (recognition) {
          recognition.abort();
          recognition = null;
        }

        // Switch back to input screen
        prompterScreen.classList.remove('active');
        inputScreen.style.display = '';
        setStatus('Ready', false);
        pauseBtn.style.display = 'none';
        resumeBtn.style.display = 'none';
      }

      // ── Pause / Resume ──
      function pause() {
        isPaused = true;
        if (recognition) recognition.stop();
        setStatus('Paused', false);
        pauseBtn.style.display = 'none';
        resumeBtn.style.display = '';
      }

      function resume() {
        isPaused = false;
        if (recognition) {
          try { recognition.start(); } catch(e) { /* already running */ }
        }
        setStatus('Listening...', true);
        pauseBtn.style.display = '';
        resumeBtn.style.display = 'none';
      }

      // ── Font size control ──
      fontSlider.addEventListener('input', () => {
        const size = fontSlider.value;
        document.documentElement.style.setProperty('--font-size', size + 'px');
        fontValue.textContent = size + 'px';
      });

      // ── Mirror mode ──
      mirrorToggle.addEventListener('change', () => {
        scriptDisplay.classList.toggle('mirror', mirrorToggle.checked);
      });

      // ── Keyboard shortcuts ──
      document.addEventListener('keydown', (e) => {
        // Space to pause/resume when in prompter mode
        if (e.code === 'Space' && prompterScreen.classList.contains('active')) {
          e.preventDefault();
          if (isPaused) resume();
          else pause();
        }

        // Escape to stop
        if (e.code === 'Escape' && prompterScreen.classList.contains('active')) {
          stop();
        }
      });

      // ── Wire up buttons ──
      startBtn.addEventListener('click', start);
      stopBtn.addEventListener('click', stop);
      pauseBtn.addEventListener('click', pause);
      resumeBtn.addEventListener('click', resume);

    })();
  </script>
</body>
</html>
